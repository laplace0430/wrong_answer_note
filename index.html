<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<link rel="manifest" href="manifest.json" />
<title>오답노트 - 필기 & 복습</title>
<meta name="description" content="틀린 문제를 정리하고 필기하며 복습까지 관리하는 오답노트 앱" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="오답노트" />
<style>
:root{
  --bg:#0b1220; --panel:#111827; --panel2:#1f2937; --panel3:#0f172a; --line:#334155;
  --text:#e5e7eb; --muted:#94a3b8; --accent:#3b82f6; --accentSoft:#1e3a8a; --danger:#ef4444;
  --shadow:0 10px 30px rgba(0,0,0,.28);
  --safe-top:max(16px, env(safe-area-inset-top));
  --safe-bottom:max(16px, env(safe-area-inset-bottom));
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif}
body{min-height:100vh}
button,input,select,textarea{font:inherit}
.app{max-width:1500px;margin:0 auto;padding:var(--safe-top) 16px calc(108px + var(--safe-bottom))}
.top{display:flex;gap:16px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
.title{font-size:34px;font-weight:800;letter-spacing:-.03em}
.sub{color:var(--muted);font-size:15px;margin-top:6px;line-height:1.5}
.install-banner{display:none;align-items:center;justify-content:space-between;gap:12px;margin:0 0 16px;padding:14px 16px;border:1px solid #1d4ed8;background:linear-gradient(135deg,#0f172a,#172554);border-radius:18px;box-shadow:var(--shadow)}
.install-banner.show{display:flex}
.install-text{font-size:14px;line-height:1.5;color:#dbeafe}
.install-actions{display:flex;gap:8px;flex-wrap:wrap}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{min-height:48px;padding:0 18px;border-radius:14px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-weight:700;box-shadow:var(--shadow);cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation}
.btn.primary{background:var(--accent);border-color:transparent;color:#fff}
.btn.soft{background:var(--accentSoft);color:#bfdbfe;border-color:transparent}
.btn.danger{background:#3b1111;color:#fecaca;border-color:transparent}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow)}
.metric .n{font-size:30px;font-weight:800}
.metric .k{font-size:13px;color:var(--muted);margin-top:4px}
.board{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px;min-height:760px}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.section-title h2{margin:0;font-size:22px}
.meta{font-size:13px;color:var(--muted)}
.input,.textarea,.select{width:100%;border:1px solid var(--line);background:var(--panel2);border-radius:16px;padding:16px;color:var(--text);outline:none;font-size:16px}
.input::placeholder,.textarea::placeholder{color:var(--muted)}
.textarea{min-height:140px;resize:vertical;line-height:1.65}
.textarea.large{min-height:220px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:12px 14px;font-size:14px;font-weight:700;color:#cbd5e1;cursor:pointer}
.chip.active{background:var(--accentSoft);border-color:transparent;color:#bfdbfe}
.searchbar{display:grid;grid-template-columns:1fr 220px 160px;gap:10px;margin-bottom:14px}
.list{display:flex;flex-direction:column;gap:14px}
.empty{border:1px dashed var(--line);background:var(--panel2);border-radius:20px;padding:32px;text-align:center;color:var(--muted)}
.card{border:1px solid var(--line);background:var(--panel2);border-radius:22px;padding:20px;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.card-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;height:32px;padding:0 11px;border-radius:999px;font-size:12px;font-weight:800}
.b-subject{background:#082f49;color:#bae6fd}.b-unit{background:#3b0764;color:#e9d5ff}.b-type{background:#052e16;color:#bbf7d0}
.b-review0{background:#450a0a;color:#fecaca}.b-review1{background:#451a03;color:#fde68a}.b-review2{background:#052e16;color:#bbf7d0}
.problem{font-size:24px;font-weight:800;line-height:1.45;margin:14px 0}
.block{margin-top:12px;padding:16px;background:var(--panel3);border:1px solid var(--line);border-radius:16px}
.block h3{margin:0 0 8px;font-size:15px}
.block p{margin:0;white-space:pre-wrap;line-height:1.7;font-size:15px}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.card-actions .btn{min-height:42px;padding:0 13px;border-radius:14px;box-shadow:none}
.preview-grid,.image-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:10px}
.preview-item,.image-item{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#0f172a}
.preview-item img,.image-item img{width:100%;height:100%;min-height:140px;object-fit:cover;display:block}
.remove-image-btn{position:absolute;top:6px;right:6px;min-height:auto;padding:7px 9px;border-radius:10px;font-size:12px;background:rgba(239,68,68,.92);color:white;border:none;cursor:pointer}
.hint{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.empty strong{display:block;color:var(--text);font-size:18px;margin-bottom:8px}
.empty-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}
.canvas-help{font-size:13px;color:var(--muted);padding:10px 12px;background:#0f172a;border-bottom:1px solid var(--line)}
.toast{position:fixed;left:50%;bottom:calc(92px + var(--safe-bottom));transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;background:#111827;color:#e5e7eb;border:1px solid var(--line);padding:12px 16px;border-radius:14px;box-shadow:var(--shadow);transition:.22s ease;z-index:300;max-width:min(92vw,480px);font-size:14px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.canvas-wrap{margin-top:10px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;position:relative;z-index:0}
.canvas-toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px;background:#0f172a;border-bottom:1px solid var(--line);align-items:center;user-select:none;-webkit-user-select:none}
.tool-btn{min-height:40px;padding:0 13px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);font-weight:700;cursor:pointer;touch-action:manipulation}
.tool-btn.active{background:var(--accent);border-color:transparent;color:white}
.stroke-range{width:120px;accent-color:#3b82f6}
.canvas-stage{position:relative;background:#fff;user-select:none;-webkit-user-select:none;overflow:auto;max-height:min(70vh,720px);touch-action:pan-y;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#drawCanvas{display:block;width:100%;height:900px;background:#fff;touch-action:none;-webkit-user-select:none;user-select:none}
.color-buttons{display:flex;gap:6px;flex-wrap:wrap}
.color-btn{min-height:40px;padding:0 13px;border-radius:12px;border:2px solid transparent;color:white;cursor:pointer;font-size:12px;font-weight:700;touch-action:manipulation}
.color-btn.active{border-color:#fff}
.color-btn.black{background:#111111}.color-btn.blue{background:#2563eb}.color-btn.red{background:#dc2626}
.footerbar{position:fixed;left:0;right:0;bottom:0;padding:10px 16px var(--safe-bottom);background:linear-gradient(to top, rgba(11,18,32,.98), rgba(11,18,32,.92), rgba(11,18,32,0));backdrop-filter:blur(10px)}
.footerinner{max-width:1500px;margin:0 auto;display:grid;grid-template-columns:1fr 78px;gap:10px}
.quicksearch{min-height:60px;border-radius:18px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:0 18px;outline:none;box-shadow:var(--shadow);font-size:16px}
.fab{border:0;border-radius:18px;background:var(--accent);color:#fff;font-size:30px;font-weight:900;box-shadow:0 10px 30px rgba(59,130,246,.3);cursor:pointer;touch-action:manipulation}
.editor-overlay{position:fixed;inset:0;z-index:100;display:none;background:var(--bg);overflow:auto}
.editor-overlay.open{display:block}
.editor-shell{padding:var(--safe-top) 18px calc(24px + var(--safe-bottom));max-width:1220px;margin:0 auto}
.editor-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;position:sticky;top:0;background:linear-gradient(to bottom, rgba(11,18,32,.98) 80%, rgba(11,18,32,0));padding-bottom:10px;z-index:2}
.editor-card{background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:22px;position:relative;z-index:1}
.field{margin-bottom:16px}
.field label{display:block;font-size:14px;font-weight:700;margin-bottom:8px;color:#cbd5e1}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{position:sticky;bottom:0;z-index:20;background:linear-gradient(to top, rgba(17,24,39,.98) 80%, rgba(17,24,39,0));padding-top:10px}
@media (max-width:1100px){
  .summary{grid-template-columns:repeat(2,1fr)}
  .install-banner{align-items:flex-start;flex-direction:column}
  .searchbar{grid-template-columns:1fr}
  .editor-shell{padding-left:12px;padding-right:12px}
  #drawCanvas{height:400px}
  .row2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
  <div class="top">
    <div>
      <div class="title">오답노트</div>
      <div class="sub">틀린 문제를 적고, 필기하고, 다시 복습할 수 있게 정리하세요.</div>
    </div>
    <div class="actions">
      <button class="btn soft" id="sampleBtn">예시 추가</button>
      <button class="btn" id="exportBtn">내보내기</button>
      <button class="btn" id="importBtn">불러오기</button>
      <input type="file" id="importFile" accept=".json" hidden />
    </div>
  </div>

  <div class="install-banner" id="installBanner">
    <div class="install-text"><strong>앱처럼 설치해서 더 편하게 쓰기</strong><br>홈 화면에 추가하면 전체화면으로 빠르게 열 수 있어요.</div>
    <div class="install-actions">
      <button class="btn primary" id="installBtn" type="button">설치</button>
      <button class="btn" id="dismissInstallBtn" type="button">닫기</button>
    </div>
  </div>

  <div class="summary">
    <div class="metric"><div class="n" id="totalCount">0</div><div class="k">전체 오답</div></div>
    <div class="metric"><div class="n" id="todayCount">0</div><div class="k">오늘 추가</div></div>
    <div class="metric"><div class="n" id="needReviewCount">0</div><div class="k">복습 필요</div></div>
    <div class="metric"><div class="n" id="doneCount">0</div><div class="k">복습 완료</div></div>
  </div>

  <main class="board">
    <div class="section-title">
      <h2>정리된 오답</h2>
      <div class="meta" id="listMeta">0개 표시 중</div>
    </div>
    <div class="searchbar">
      <input class="input" id="searchInput" placeholder="문제, 과목, 단원, 이유 검색" />
      <input class="input" id="subjectFilter" placeholder="과목 필터" />
      <select class="select" id="reviewFilter">
        <option value="전체">전체 상태</option>
        <option value="복습 필요">복습 필요</option>
        <option value="복습 중">복습 중</option>
        <option value="복습 완료">복습 완료</option>
      </select>
    </div>
    <div class="list" id="list"></div>
  </main>
</div>

<!-- 에디터 오버레이 -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-shell">
    <div class="editor-header">
      <h2 id="formTitle" style="margin:0;font-size:26px;">오답 작성</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn" id="resetFormBtn">초기화</button>
        <button class="btn" id="closeEditorBtn">닫기</button>
      </div>
    </div>
    <div class="editor-card">
      <div class="row2">
        <div class="field">
          <label>과목</label>
          <input class="input" id="subjectInput" placeholder="예: 수학, 물리학1, 영어" />
        </div>
        <div class="field">
          <label>단원</label>
          <input class="input" id="unitInput" placeholder="예: 적분, 역학, 전자기" />
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>유형</label>
          <input class="input" id="typeInput" placeholder="예: 계산 실수, 개념 미흡" />
        </div>
        <div class="field">
          <label>푼 날짜</label>
          <input class="input" id="dateInput" type="date" />
        </div>
      </div>
      <div class="field">
        <label>출처</label>
        <input class="input" id="sourceInput" placeholder="예: 3월 모의고사 12번, 수특 45쪽" />
      </div>
      <div class="field">
        <label>문제 / 제목</label>
        <textarea class="textarea large" id="problemInput" placeholder="어떤 문제였는지, 무엇을 물었는지 자세히 적기"></textarea>
      </div>
      <div class="field">
        <label>문제 이미지</label>
        <input class="input" id="problemImageInput" type="file" accept="image/*" multiple />
        <div class="hint">문제 캡처, 지문 사진 등을 첨부하세요.</div>
        <div class="preview-grid" id="problemImagePreview"></div>
      </div>
      <div class="field">
        <label>틀린 이유</label>
        <div class="chips" id="reasonChips">
          <button type="button" class="chip active" data-value="개념 부족">개념 부족</button>
          <button type="button" class="chip" data-value="계산 실수">계산 실수</button>
          <button type="button" class="chip" data-value="조건 해석 실수">조건 해석 실수</button>
          <button type="button" class="chip" data-value="시간 부족">시간 부족</button>
          <button type="button" class="chip" data-value="암기 부족">암기 부족</button>
        </div>
      </div>
      <div class="field">
        <label>세부 원인</label>
        <textarea class="textarea" id="reasonDetailInput" placeholder="왜 틀렸는지, 어떤 생각 때문에 막혔는지 자세히 적기"></textarea>
      </div>
      <div class="field">
        <label>정답 / 다시 푼 핵심</label>
        <textarea class="textarea large" id="correctInput" placeholder="다시 풀면서 핵심 논리와 정답을 정리"></textarea>
      </div>
      <div class="field">
        <label>풀이 이미지</label>
        <input class="input" id="solutionImageInput" type="file" accept="image/*" multiple />
        <div class="hint">직접 푼 풀이 사진, 필기 캡처 등을 첨부하세요.</div>
        <div class="preview-grid" id="solutionImagePreview"></div>
      </div>
      <div class="field">
        <label>풀이 필기</label>
        <div class="canvas-wrap">
          <div class="canvas-toolbar">
            <button type="button" class="tool-btn active" id="penToolBtn">펜</button>
            <button type="button" class="tool-btn" id="eraserToolBtn">지우개</button>
            <button type="button" class="tool-btn" id="moveToolBtn">스크롤</button>
            <div class="color-buttons">
              <button type="button" class="color-btn black active" data-color="#111111">검정</button>
              <button type="button" class="color-btn blue" data-color="#2563eb">파랑</button>
              <button type="button" class="color-btn red" data-color="#dc2626">빨강</button>
            </div>
            <input type="range" id="penSize" class="stroke-range" min="2" max="18" value="5">
            <button type="button" class="tool-btn" id="undoBtn">되돌리기</button>
            <button type="button" class="tool-btn" id="clearCanvasBtn">전체 지우기</button>
          </div>
          <div class="canvas-help">펜으로 쓸 때는 펜/지우개, 화면을 움직일 때는 스크롤 버튼을 누르세요.</div>
          <div class="canvas-stage"><canvas id="drawCanvas"></canvas></div>
          <div class="hint">펜/지우개 모드에서는 필기하고, 스크롤 모드에서는 손가락으로 위아래 이동할 수 있습니다.</div>
        </div>
      </div>
      <div class="field">
        <label>다음에 안 틀리기 위한 한 줄</label>
        <textarea class="textarea" id="memoryInput" placeholder="예: 부호 먼저 확인, 그래프 해석 먼저, 조건 문장 두 번 읽기"></textarea>
      </div>
      <div class="row2 form-actions">
        <button class="btn primary" id="saveBtn" type="button">저장</button>
        <button class="btn soft" id="reviewBtn" type="button">복습 완료 표시</button>
      </div>
    </div>
  </div>
</div>

<!-- 하단 바 -->
<div class="footerbar">
  <div class="footerinner">
    <input class="quicksearch" id="quickSearch" placeholder="빠르게 검색" />
    <button class="fab" id="newBtn">+</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_NAME = "wrong_note_db_v2";
const DB_VERSION = 1;
const NOTES_STORE = "notes";
const DRAFT_KEY = "editor_draft_v2";
const today = new Date().toISOString().slice(0, 10);

let notes = [];
let editingId = null;
let problemImages = [];
let solutionImages = [];
let currentDrawing = null;
let deferredInstallPrompt = null;

const installBanner = document.getElementById("installBanner");
const installBtn = document.getElementById("installBtn");
const dismissInstallBtn = document.getElementById("dismissInstallBtn");
const toast = document.getElementById("toast");

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => toast.classList.remove("show"), 2200);
}

function closeInstallBanner() {
  installBanner.classList.remove("show");
}

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  installBanner.classList.add("show");
});

window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  closeInstallBanner();
  showToast("앱이 설치되었습니다.");
});

installBtn?.addEventListener("click", async () => {
  if (!deferredInstallPrompt) {
    showToast("브라우저 메뉴에서 홈 화면에 추가할 수 있어요.");
    return;
  }
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice.catch(() => null);
  deferredInstallPrompt = null;
  closeInstallBanner();
});

dismissInstallBtn?.addEventListener("click", closeInstallBanner);

// ── IndexedDB ──────────────────────────────────────────────
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(NOTES_STORE))
        db.createObjectStore(NOTES_STORE, { keyPath: "id" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function loadNotes() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(NOTES_STORE, "readonly");
    const req = tx.objectStore(NOTES_STORE).getAll();
    req.onsuccess = () => resolve(Array.isArray(req.result) ? req.result : []);
    req.onerror = () => reject(req.error);
  });
}

async function saveNotes() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(NOTES_STORE, "readwrite");
    const store = tx.objectStore(NOTES_STORE);
    store.clear().onsuccess = () => notes.forEach(n => store.put(n));
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  });
}

// ── Draft (localStorage) ───────────────────────────────────
function saveDraft() {
  try {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      editingId,
      subject: document.getElementById("subjectInput").value,
      unit: document.getElementById("unitInput").value,
      type: document.getElementById("typeInput").value,
      date: document.getElementById("dateInput").value,
      source: document.getElementById("sourceInput").value,
      problem: document.getElementById("problemInput").value,
      reason: selectedReason(),
      reasonDetail: document.getElementById("reasonDetailInput").value,
      correct: document.getElementById("correctInput").value,
      memory: document.getElementById("memoryInput").value,

// ── Images ─────────────────────────────────────────────────
function compressImage(file, maxSize = 1600, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleImageInput(input, targetArray) {
  const files = Array.from(input.files || []);
  if (!files.length) return;
  const loaded = await Promise.all(files.map(f => compressImage(f)));
  targetArray.push(...loaded);
  input.value = "";
  syncPreviews();
  saveDraft();
}

// ── Canvas ─────────────────────────────────────────────────
const canvas = document.getElementById("drawCanvas");
const ctx = canvas.getContext("2d");
let dpr = Math.max(window.devicePixelRatio || 1, 1);
let isDrawing = false;
let lastPoint = null;
let currentTool = "pen";
let penColor = "#111111";
let penSize = 5;
let drawHistory = [];
let autosaveTimer = null;
const canvasStage = document.querySelector(".canvas-stage");

function initCanvas(restoreDataUrl) {
  dpr = Math.max(window.devicePixelRatio || 1, 1);
  const rect = canvas.getBoundingClientRect();
  const w = Math.max(1, Math.floor(rect.width * dpr));
  const cssH = canvas.offsetHeight || 900;
  const h = Math.max(1, Math.floor(cssH * dpr));
  canvas.width = w;
  canvas.height = h;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fillWhite();
  drawHistory = [];
  if (restoreDataUrl) {
    loadCanvasImage(restoreDataUrl);
  } else if (currentDrawing) {
    loadCanvasImage(currentDrawing);
  } else {
    snapshotCanvas();
  }
}

function fillWhite() {
  const w = canvas.width / dpr;
  const h = canvas.height / dpr;
  ctx.globalCompositeOperation = "source-over";
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, w, h);
}

function snapshotCanvas() {
  try {
    const url = canvas.toDataURL("image/png");
    drawHistory.push(url);
    if (drawHistory.length > 50) drawHistory.shift();
    currentDrawing = isCanvasBlank() ? null : url;
  } catch {}
}

function isCanvasBlank() {
  const blank = document.createElement("canvas");
  blank.width = canvas.width; blank.height = canvas.height;
  const bctx = blank.getContext("2d");
  bctx.fillStyle = "#fff";
  bctx.fillRect(0, 0, blank.width, blank.height);
  return canvas.toDataURL() === blank.toDataURL();
}

function loadCanvasImage(dataUrl) {
  if (!dataUrl) { snapshotCanvas(); return; }
  const img = new Image();
  img.onload = () => {
    fillWhite();
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    ctx.drawImage(img, 0, 0, w, h);
    snapshotCanvas();
  };
  img.src = dataUrl;
}

function applyBrush() {
  if (currentTool === "eraser") {
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
    ctx.lineWidth = penSize * 2.5;
  } else {
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = penColor;
    ctx.lineWidth = penSize;
  }
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

function getCanvasPoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function startDraw(x, y) {
  if (currentTool === "move") return;
  isDrawing = true;
  lastPoint = { x, y };
  applyBrush();
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function moveDraw(x, y) {
  if (!isDrawing) return;
  applyBrush();
  ctx.lineTo(x, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, y);
  lastPoint = { x, y };
  scheduleCanvasAutosave();
}

function endDraw() {
  if (!isDrawing) return;
  isDrawing = false;
  lastPoint = null;
  ctx.closePath();
  snapshotCanvas();
  saveDraft();
}

function scheduleCanvasAutosave() {
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => { snapshotCanvas(); saveDraft(); }, 400);
}

// Pointer 이벤트 (마우스 + 스타일러스 + 터치 모두 지원)
canvas.addEventListener("pointerdown", e => {
  if (currentTool === "move") return;
  e.preventDefault();
  const p = getCanvasPoint(e.clientX, e.clientY);
  startDraw(p.x, p.y);
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener("pointermove", e => {
  if (currentTool === "move") return;
  e.preventDefault();
  if (!isDrawing) return;
  const p = getCanvasPoint(e.clientX, e.clientY);
  moveDraw(p.x, p.y);
});
canvas.addEventListener("pointerup", e => { if (currentTool !== "move") { e.preventDefault(); endDraw(); } });
canvas.addEventListener("pointercancel", e => { if (currentTool !== "move") { e.preventDefault(); endDraw(); } });

// 툴 버튼
function setTool(tool) {

// ── Review / Delete / Duplicate ────────────────────────────
function reviewLabel(s) { return s === 2 ? "복습 완료" : s === 1 ? "복습 중" : "복습 필요"; }
function reviewBadgeClass(s) { return s === 2 ? "b-review2" : s === 1 ? "b-review1" : "b-review0"; }

function cycleReview(id) {
  const idx = notes.findIndex(n => n.id === id);
  if (idx === -1) return;
  notes[idx].reviewStatus = (notes[idx].reviewStatus + 1) % 3;
  saveNotes();
  render();
  showToast("오답을 삭제했습니다.");
  showToast("복습 상태를 변경했습니다.");
}

function removeNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  if (!confirm(`'${note.problem.slice(0, 20)}' 삭제할까요?`)) return;
  notes = notes.filter(n => n.id !== id);
  if (editingId === id) resetForm();
  saveNotes();
  render();
  showToast("오답을 복제했습니다.");
}

function duplicateNote(id) {
  const note = notes.find(n => n.id === id);
  if (!note) return;
  notes.unshift({ ...note, id: genId(), problem: note.problem + " (복사본)", reviewStatus: 0, createdAt: Date.now() });
  saveNotes();
  render();
}

window.openEdit = openEdit;
window.cycleReview = cycleReview;
window.removeNote = removeNote;
window.duplicateNote = duplicateNote;

// ── Filter & Render ────────────────────────────────────────
function filteredNotes() {
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const subjectFilter = document.getElementById("subjectFilter").value.trim().toLowerCase();
  const reviewFilter = document.getElementById("reviewFilter").value;
  return [...notes]
    .filter(n => {
      const text = [n.problem, n.subject, n.unit, n.reason, n.reasonDetail, n.correct, n.memory, n.source, n.type].join(" ").toLowerCase();
      return (!keyword || text.includes(keyword))
        && (!subjectFilter || (n.subject || "").toLowerCase().includes(subjectFilter))
        && (reviewFilter === "전체" || reviewLabel(n.reviewStatus) === reviewFilter);
    })
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
}

function renderSummary() {
  document.getElementById("totalCount").textContent = notes.length;
  document.getElementById("todayCount").textContent = notes.filter(n => n.date === today).length;
  document.getElementById("needReviewCount").textContent = notes.filter(n => n.reviewStatus !== 2).length;
  document.getElementById("doneCount").textContent = notes.filter(n => n.reviewStatus === 2).length;
}

          ${note.type ? `<span class="badge b-type">${esc(note.type)}</span>` : ""}
          <span class="badge ${reviewBadgeClass(note.reviewStatus)}">${reviewLabel(note.reviewStatus)}</span>

      ${note.problemImages?.length ? `<div class="block"><h3>문제 이미지</h3><div class="image-grid">${note.problemImages.map(img => `<div class="image-item"><img src="${img}" alt=""></div>`).join("")}</div></div>` : ""}

      <div class="block"><h3>다시 푼 핵심</h3><p>${esc(note.correct || "아직 정리 안 함")}</p></div>

function exportData() {

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "wrong_note_backup.json";
  a.click();
  URL.revokeObjectURL(a.href);

}

function importData(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!Array.isArray(parsed)) throw new Error();
      notes = parsed.map(n => ({
        ...n,
        problemImages: Array.isArray(n.problemImages) ? n.problemImages : [],
        solutionImages: Array.isArray(n.solutionImages) ? n.solutionImages : [],
        drawing: n.drawing || null
      }));
      await saveNotes();
      resetForm();
      render();
      showToast("백업 파일을 불러왔습니다.");
    } catch { alert("올바른 JSON 파일이 아닙니다."); }
  };
  reader.readAsText(file, "utf-8");
}

  render();
});
document.getElementById("subjectFilter").addEventListener("input", render);
document.getElementById("reviewFilter").addEventListener("change", render);

// 텍스트 입력 자동 초안 저장
["subjectInput","unitInput","typeInput","dateInput","sourceInput",
 "problemInput","reasonDetailInput","correctInput","memoryInput"].forEach(id => {
  document.getElementById(id).addEventListener("input", saveDraft);
});

// 앱 숨김 / 종료 시 초안 저장
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") { snapshotCanvas(); saveDraft(); }
});
window.addEventListener("pagehide", () => { snapshotCanvas(); saveDraft(); });

// 화면 회전 / 리사이즈 시 캔버스 재초기화
window.addEventListener("resize", () => {
  if (editorOverlay.classList.contains("open")) initCanvas(currentDrawing);
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}

// ── Init ───────────────────────────────────────────────────
async function initApp() {
  notes = await loadNotes();
  render();
}
initApp();
</script>
</body>
</html>
